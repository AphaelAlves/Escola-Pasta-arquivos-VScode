    <script>
        
        const botao = document.querySelector(".btn1");
        const abaLateral = document.querySelector("#abaLateral");
    
        botao.addEventListener("click", (evento) => {
            evento.stopPropagation();
            abaLateral.classList.toggle("ativa");
        });

        abaLateral.addEventListener("click", (evento) =>{

            abaLateral.classList.remove("ativa");
        });
